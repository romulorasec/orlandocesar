<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background shape for contrast -->
  <rect width="200" height="48" fill="none"/>
  
  <!-- Icon: Elegant House -->
  <g transform="translate(4, 8)">
    <!-- House background -->
    <rect x="2" y="8" width="28" height="28" rx="4" fill="#B1E158" fill-opacity="0.12"/>
    
    <!-- House outline -->
    <path d="M16 4L27 12V30C27 30.5523 26.5523 31 26 31H6C5.44772 31 5 30.5523 5 30V12L16 4Z" 
          stroke="#D4E886" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Door -->
    <rect x="12" y="22" width="8" height="9" rx="1" fill="#D4E886" fill-opacity="0.3"/>
    <path d="M12 22C12 21.4477 12.4477 21 13 21H19C19.5523 21 20 21.4477 20 22V31H12V22Z" 
          stroke="#D4E886" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Windows -->
    <circle cx="10" cy="16" r="1.2" fill="#D4E886"/>
    <circle cx="22" cy="16" r="1.2" fill="#D4E886"/>
  </g>
  
  <!-- Text: ORLANDO CESAR -->
  <g transform="translate(44, 0)">
    <!-- ORLANDO -->
    <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">ORLANDO</text>
    
    <!-- CESAR -->
    <text x="0" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#D4E886" letter-spacing="-0.01em">CESAR</text>
    
    <!-- Subtitle -->
    <text x="0" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="500" fill="#FAFAFA" fill-opacity="0.5" letter-spacing="0.1em">CORRETOR IMOBILIÁRIO</text>
  </g>
</svg>
